<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シーリングマジック調色可能番号確認アプリ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@500&display=swap');
:root{
  --bg:#f0f4fa;--surface:#fff;--surface2:#e8edf8;
  --accent:#1a5cd4;--ng:#b91c1c;--ng-bg:#fef2f2;--ng-bd:#fca5a5;
  --text:#1a2340;--muted:#6b7a99;--border:#d8e0f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 0 90px; /* 固定ボタン分 */
}

/* ── ヘッダー ── */
.app-header{width:100%;max-width:375px;padding:20px 16px 10px}
.brand{font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;font-weight:700}
.app-title{font-size:1.05rem;font-weight:900;color:var(--text);line-height:1.2}
.app-title span{color:var(--accent)}

/* ── 入力カード ── */
.input-card{
  width:100%;max-width:375px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px;
  box-shadow:0 2px 8px rgba(26,92,212,.06);
  margin:0 0 10px;
}
.card-label{font-size:.62rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.input-row{display:flex;gap:8px}
.color-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:12px 14px;
  font-size:1.15rem;font-family:'DM Mono',monospace;font-weight:500;
  color:var(--text);outline:none;min-height:48px;
  transition:border-color .2s;
}
.color-input:focus{border-color:var(--accent)}
.color-input::placeholder{color:#b0bcd4;font-size:.8rem;font-family:'Noto Sans JP',sans-serif}
.check-btn{
  background:var(--accent);border:none;border-radius:10px;
  padding:0 20px;min-height:48px;
  font-size:1rem;font-weight:700;color:#fff;
  cursor:pointer;font-family:inherit;flex-shrink:0;
  transition:opacity .15s,transform .1s;
}
.check-btn:active{opacity:.85;transform:scale(.96)}

/* サジェスト */
.suggest-wrap{display:none;flex-wrap:wrap;gap:6px;margin-top:8px}
.suggest-chip{
  border-radius:8px;padding:8px 13px;
  font-family:'DM Mono',monospace;font-size:.85rem;
  cursor:pointer;border:1px solid rgba(0,0,0,.08);
  font-weight:500;
}

/* ── 結果バナー ── */
.result-banner{
  width:100%;max-width:375px;
  border-radius:16px;
  padding:48px 24px;
  display:none; /* JSでblock/flexに切り替え */
  flex-direction:column;
  box-shadow:0 6px 24px rgba(0,0,0,.15);
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
  margin:0 0 10px;
}
.result-banner.show{display:flex}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.result-banner.ng-banner{background:var(--ng-bg);border:1.5px solid var(--ng-bd)}

.banner-status{font-size:.85rem;letter-spacing:.18em;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.banner-code{font-family:'DM Mono',monospace;font-size:3.2rem;font-weight:500;letter-spacing:.04em;line-height:1}
.banner-msg{font-size:1rem;margin-top:8px;opacity:.85}
.banner-warn{font-size:.65rem;border-radius:6px;padding:5px 10px;margin-top:14px;display:inline-block}

/* 近似候補 */
.maybe-label{font-size:.65rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:14px}
.maybe-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.maybe-chip{
  border-radius:10px;padding:10px 13px;
  cursor:pointer;border:1px solid rgba(0,0,0,.08);
  font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500;
}
.maybe-chip:active{opacity:.8}

/* ── 一覧固定ボタン ── */
.list-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(240,244,250,.96);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-top:1px solid var(--border);z-index:50;
}
.list-btn{
  display:block;width:100%;max-width:375px;margin:0 auto;
  background:var(--accent);border:none;border-radius:12px;
  padding:15px 0;font-size:1rem;font-weight:700;color:#fff;
  cursor:pointer;font-family:inherit;letter-spacing:.04em;
  box-shadow:0 4px 14px rgba(26,92,212,.4);
  transition:opacity .15s,transform .1s;
}
.list-btn:active{opacity:.85;transform:scale(.98)}

/* ── 一覧オーバーレイ ── */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4fa;z-index:100;flex-direction:column}
.overlay.show{display:flex}
.ov-header{
  padding:16px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;
}
.ov-title{font-size:.95rem;font-weight:900;color:var(--text)}
.ov-title span{color:var(--accent)}
.close-btn{background:none;border:none;font-size:1.5rem;color:var(--muted);cursor:pointer;padding:4px 8px;line-height:1}
.ov-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px}

/* 一覧：3列グリッド */
.list-group{margin-bottom:14px}
.list-group-label{
  font-size:.72rem;letter-spacing:.1em;font-weight:700;color:var(--accent);
  text-transform:uppercase;margin-bottom:6px;padding-left:2px;
}
.list-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}
.list-chip{
  border-radius:10px;
  padding:20px 4px;
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:.85rem;
  font-weight:700;
  cursor:pointer;
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 5px rgba(0,0,0,.12);
  transition:transform .1s,opacity .1s;
  line-height:1.3;
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.list-chip:active{transform:scale(.95);opacity:.85}
.ov-count{font-size:.65rem;color:#b0bcd4;text-align:right;padding:4px 0 8px}
</style>
</head>
<body>

<div class="app-header">
  <div class="brand">Sealing Magic</div>
  <div class="app-title">シーリングマジック<span>調色可能番号確認アプリ</span></div>
</div>

<div class="input-card">
  <div class="card-label">色番号を入力</div>
  <div class="input-row">
    <input class="color-input" id="colorInput"
      placeholder="例：19-80D　N-75　90"
      maxlength="10"
      oninput="onInput()"
      onkeydown="if(event.key==='Enter')checkColor()"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <button class="check-btn" onclick="checkColor()">確認</button>
  </div>
  <div class="suggest-wrap" id="suggestWrap"></div>
</div>

<div class="result-banner" id="resultBanner"></div>

<div class="list-bar">
  <button class="list-btn" onclick="openList()">📋 調色可能番号 一覧を確認する</button>
</div>

<div class="overlay" id="listOverlay">
  <div class="ov-header">
    <div class="ov-title">調色可能番号 <span>一覧</span></div>
    <button class="close-btn" onclick="closeList()">✕</button>
  </div>
  <div class="ov-body" id="ovBody">
    <div class="ov-count" id="ovCount"></div>
  </div>
</div>

const colorMap=new Map(COLORS.map(c=>[c.replace(/-/g,'').toUpperCase(),c]));
function lookup(v){if(!v)return null;return colorMap.get(v)||colorMap.get('N'+v)||null}
function normalize(s){return s.toUpperCase().replace(/[Ａ-Ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/-/g,'').trim()}
function getHex(c){return COLOR_RGB[c]||null}
function textColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.2126*r+0.7152*g+0.0722*b)/255>0.45?'#1a2340':'#ffffff';
}

function onInput(){
  const val=normalize(document.getElementById('colorInput').value);
  const wrap=document.getElementById('suggestWrap');
  if(val.length<2||lookup(val)){wrap.style.display='none';return}
  const hits=COLORS.filter(c=>c.replace(/-/g,'').toUpperCase().startsWith(val)&&c.replace(/-/g,'').toUpperCase()!==val).slice(0,6);
  if(!hits.length){wrap.style.display='none';return}
  wrap.innerHTML=hits.map(m=>{
    const h=getHex(m),fg=h?textColor(h):'#1a5cd4',bg=h||'#e8edf8';
    return`<span class="suggest-chip" style="background:${bg};color:${fg};border-color:${bg}" onclick="pick('${m}')">${m}</span>`;
  }).join('');
  wrap.style.display='flex';
}

function pick(code){
  document.getElementById('colorInput').value=code;
  document.getElementById('suggestWrap').style.display='none';
  checkColor();
}

function checkColor(){
  const val=normalize(document.getElementById('colorInput').value);
  const banner=document.getElementById('resultBanner');
  document.getElementById('suggestWrap').style.display='none';

  if(!val){
    banner.className='result-banner';
    banner.style.cssText='';
    return;
  }

  const matched=lookup(val);

  // アニメーション再起動
  banner.className='result-banner';
  banner.style.cssText='';
  banner.innerHTML='';
  void banner.offsetWidth;

  if(matched){
    const hex=getHex(matched);
    const fg=hex?textColor(hex):'#1a2340';
    const warnBg=fg==='#ffffff'?'rgba(255,255,255,.2)':'rgba(0,0,0,.1)';
    banner.className='result-banner show';
    if(hex){
      banner.style.background=hex;
      banner.style.border='none';
    }else{
      banner.style.background='#ecfdf5';
      banner.style.border='1.5px solid #6ee7b7';
    }
    banner.innerHTML=
      `<div class="banner-status" style="color:${fg}">✓ 調色可能</div>`+
      `<div class="banner-code" style="color:${fg}">${matched}</div>`+
      `<div class="banner-msg" style="color:${fg}">シーリングマジックで調色できます</div>`+
      (hex?`<div class="banner-warn" style="background:${warnBg};color:${fg}">⚠️ 参考色表示（実際の塗料色とは異なります）</div>`:'');
  }else{
    const sugg=getSuggestions(val);
    const chips=sugg.map(({code})=>{
      const h=getHex(code),fg=h?textColor(h):'#b91c1c',bg=h||'#fef2f2';
      return`<span class="maybe-chip" style="background:${bg};color:${fg}" onclick="pick('${code}')">${code}</span>`;
    }).join('');
    banner.className='result-banner show ng-banner';
    banner.innerHTML=
      `<div class="banner-status" style="color:#b91c1c">✗ 調色不可</div>`+
      `<div class="banner-code" style="color:#b91c1c">${val}</div>`+
      `<div class="banner-msg" style="color:#6b7a99">この番号は調色対象外です</div>`+
      (sugg.length?`<div class="maybe-label">近似色の候補</div><div class="maybe-chips">${chips}</div>`:'');
  }
  setTimeout(()=>banner.scrollIntoView({behavior:'smooth',block:'nearest'}),30);
}

function getSuggestions(val){
  const ev=/^\d+$/.test(val)?'N'+val:val;
  const m=ev.match(/^([A-Z]*)(\d+)([A-Z]*)$/);
  const seen=new Set(),res=[];
  const add=(c,r)=>{if(!seen.has(c)){seen.add(c);res.push({code:c,reason:r})}};
  if(m){
    const[,pre,ns,suf]=m,num=parseInt(ns);
    COLORS.forEach(c=>{const k=c.replace(/-/g,'').toUpperCase(),cm=k.match(/^([A-Z]*)(\d+)([A-Z]*)$/);if(cm&&cm[1]===pre&&cm[2]===ns&&cm[3]!==suf)add(c,'同番号')});
    COLORS.map(c=>{const k=c.replace(/-/g,'').toUpperCase(),cm=k.match(/^([A-Z]*)(\d+)([A-Z]*)$/);return cm?{c,pre:cm[1],num:parseInt(cm[2]),suf:cm[3]}:null}).filter(x=>x&&x.pre===pre&&x.suf===suf&&x.num!==num).sort((a,b)=>Math.abs(a.num-num)-Math.abs(b.num-num)).forEach(x=>add(x.c,'近似'));
  }else{COLORS.forEach(c=>{if(c.replace(/-/g,'').toUpperCase().includes(val))add(c,'部分一致')})}
  return res.slice(0,5);
}

function openList(){
  const groups={};
  COLORS.forEach(c=>{const key=c.startsWith('N')?'N系':c.split('-')[0];if(!groups[key])groups[key]=[];groups[key].push(c)});
  const keys=Object.keys(groups).sort((a,b)=>{if(a==='N系')return 1;if(b==='N系')return -1;return parseInt(a)-parseInt(b)});
  const html=keys.map(key=>{
    const label=key==='N系'?'N':key;
    const chips=groups[key].map(c=>{
      const h=getHex(c),fg=h?textColor(h):'#1a2340',bg=h||'#eef2fb';
      return`<div class="list-chip" style="background:${bg};color:${fg}" onclick="pickFromList('${c}')">${c}</div>`;
    }).join('');
    return`<div class="list-group"><div class="list-group-label">${label}</div><div class="list-grid">${chips}</div></div>`;
  }).join('');
  document.getElementById('ovBody').innerHTML=`<div class="ov-count">全${COLORS.length}色　タップで確認</div>${html}`;
  document.getElementById('listOverlay').classList.add('show');
}
function pickFromList(code){
  closeList();
  document.getElementById('colorInput').value=code;
  checkColor();
}
function closeList(){document.getElementById('listOverlay').classList.remove('show')}
</script>
