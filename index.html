<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シーリングマジック調色可能番号確認アプリ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@500&display=swap');
:root{--bg:#f0f4fa;--surface:#fff;--surface2:#e8edf8;--accent:#1a5cd4;--ng:#b91c1c;--ng-bg:#fef2f2;--ng-bd:#fca5a5;--text:#1a2340;--muted:#6b7a99;--border:#d8e0f0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
.app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;padding:0 14px;overflow:hidden}

/* ヘッダー */
.header{padding:18px 0 10px;flex-shrink:0}
.brand{font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;font-weight:700}
.title{font-size:1.05rem;font-weight:900;color:var(--text);line-height:1.2}
.title span{color:var(--accent)}

/* 入力カード */
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(26,92,212,.06)}
.card-label{font-size:.62rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.input-row{display:flex;gap:8px}
.color-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:1.1rem;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);outline:none;min-height:44px;transition:border-color .2s}
.color-input:focus{border-color:var(--accent)}
.color-input::placeholder{color:#b0bcd4;font-size:.78rem;font-family:'Noto Sans JP',sans-serif;letter-spacing:0}
.check-btn{background:var(--accent);border:none;border-radius:10px;padding:0 18px;min-height:44px;font-size:.9rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;flex-shrink:0;transition:opacity .15s,transform .1s}
.check-btn:active{opacity:.85;transform:scale(.96)}
.suggest-wrap{display:none;flex-wrap:wrap;gap:6px;margin-top:8px}
.suggest-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);cursor:pointer}
.suggest-chip:active{background:#d0dcf8}

/* スクロールエリア */
.result-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:10px;padding:10px 0 8px}

/* ★★★ 結果バナー（全面色表示） ★★★ */
.result-banner{
  border-radius:16px;
  padding:22px 20px;
  display:none;
  flex-direction:column;
  flex-shrink:0;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  position:relative;
  overflow:hidden;
}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* 調色不可は従来通り */
.result-banner.ng{background:var(--ng-bg);border:1.5px solid var(--ng-bd)}

.banner-status{font-size:.65rem;letter-spacing:.18em;font-weight:700;text-transform:uppercase;opacity:.85;margin-bottom:4px}
.banner-code{font-family:'DM Mono',monospace;font-size:2.2rem;font-weight:500;letter-spacing:.04em;line-height:1.1}
.banner-msg{font-size:.8rem;margin-top:4px;opacity:.8}

/* 参考色注意 */
.banner-warn{
  font-size:.62rem;
  background:rgba(0,0,0,.15);
  border-radius:6px;
  padding:4px 9px;
  margin-top:12px;
  display:inline-block;
  backdrop-filter:blur(4px);
}

/* 調色不可の近似候補 */
.maybe-label{font-size:.6rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:10px}
.maybe-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.maybe-chip{background:#fff;border:1.5px solid var(--ng-bd);border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:7px}
.maybe-chip:active{background:#fee2e2}
.chip-swatch{width:22px;height:22px;border-radius:5px;flex-shrink:0;border:1px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.chip-code{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;color:var(--ng)}
.chip-reason{font-size:.58rem;color:#e06060}

/* 一覧固定ボタン */
.list-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(240,244,250,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid var(--border);z-index:50}
.list-btn{display:block;width:100%;max-width:480px;margin:0 auto;background:var(--accent);border:none;border-radius:12px;padding:14px 0;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;letter-spacing:.04em;box-shadow:0 4px 14px rgba(26,92,212,.4);transition:opacity .15s,transform .1s}
.list-btn:active{opacity:.85;transform:scale(.98)}

/* オーバーレイ一覧 */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4fa;z-index:100;flex-direction:column}
.overlay.show{display:flex}
.overlay-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid #d8e0f0;flex-shrink:0}
.overlay-title{font-size:.9rem;font-weight:900;color:#1a2340}
.overlay-title span{color:#1a5cd4}
.close-btn{background:none;border:none;font-size:1.4rem;color:#6b7a99;cursor:pointer;padding:4px 8px;line-height:1}
.list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.list-table tr{border-bottom:1px solid #e8edf8}
.list-table tr:last-child{border-bottom:none}
.list-table td{padding:8px 10px;vertical-align:middle}
.list-grp{font-weight:700;color:#1a5cd4;font-size:.82rem;white-space:nowrap;width:32px}
.list-chips{display:flex;flex-wrap:wrap;gap:5px}
.list-chip{
  display:inline-block;
  border-radius:8px;
  padding:6px 11px;
  font-size:.75rem;
  font-family:'DM Mono',monospace;
  font-weight:500;
  cursor:pointer;
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 1px 3px rgba(0,0,0,.1);
  transition:transform .1s,opacity .1s;
}
.list-chip:active{transform:scale(.95);opacity:.85}
.list-count{font-size:.65rem;color:#b0bcd4;text-align:right;margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand">Sealing Magic</div>
    <div class="title">シーリングマジック<span>調色可能番号確認アプリ</span></div>
  </div>
  <div class="input-card">
    <div class="card-label">色番号を入力</div>
    <div class="input-row">

    <div class="suggest-wrap" id="suggestWrap"></div>
  </div>
  <div class="result-area">
    <div class="result-banner" id="resultBanner"></div>
  </div>
</div>

<div class="list-bar">
  <button class="list-btn" onclick="openList()">📋 調色可能番号 一覧を確認する</button>
</div>

<div class="overlay" id="listOverlay">

    <button class="close-btn" onclick="closeList()">✕</button>
  </div>
  <div class="list-body">
    <table class="list-table" id="listTable"></table>
    <div class="list-count" id="listCount"></div>
  </div>
</div>

const colorMap=new Map(COLORS.map(c=>[c.replace(/-/g,'').toUpperCase(),c]));
function lookup(v){if(!v)return null;return colorMap.get(v)||colorMap.get('N'+v)||null}
function normalize(s){return s.toUpperCase().replace(/[Ａ-Ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/-/g,'').trim()}
function getHex(code){return COLOR_RGB[code]||null}

// 背景色に対して読みやすい文字色（白 or 黒）を自動選択
function textColor(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  // WCAG相対輝度
  const lum=0.2126*r/255+0.7152*g/255+0.0722*b/255;
  return lum>0.45?'#1a2340':'#ffffff';
}

function onInput(){
  const val=normalize(document.getElementById('colorInput').value);
  const wrap=document.getElementById('suggestWrap');
  if(val.length<2||lookup(val)){wrap.style.display='none';return}
  const hits=COLORS.filter(c=>c.replace(/-/g,'').toUpperCase().startsWith(val)&&c.replace(/-/g,'').toUpperCase()!==val).slice(0,6);
  if(!hits.length){wrap.style.display='none';return}
  wrap.innerHTML=hits.map(m=>`<span class="suggest-chip" onclick="pick('${m}')">${m}</span>`).join('');
  wrap.style.display='flex';
}

function pick(code){
  document.getElementById('colorInput').value=code;
  document.getElementById('suggestWrap').style.display='none';
  checkColor();
}

function checkColor(){
  const val=normalize(document.getElementById('colorInput').value);
  const banner=document.getElementById('resultBanner');
  document.getElementById('suggestWrap').style.display='none';
  if(!val){banner.style.display='none';return}

  const matched=lookup(val);
  banner.style.display='none';void banner.offsetWidth;banner.style.display='flex';

  if(matched){
    const hex=getHex(matched);
    const fg=hex?textColor(hex):'#1a2340';
    const bgStyle=hex?`background:${hex};border:none;`:'background:#ecfdf5;border:1.5px solid #6ee7b7;';
    const warnStyle=`background:rgba(${fg==='#ffffff'?'255,255,255':'0,0,0'},.15);color:${fg};`;

    banner.className='result-banner ok';
    banner.style.cssText=bgStyle;
    banner.innerHTML=`
      <div class="banner-status" style="color:${fg}">✓ 調色可能</div>
      <div class="banner-code" style="color:${fg}">${matched}</div>
      <div class="banner-msg" style="color:${fg}">シーリングマジックで調色できます</div>
      ${hex?`<div class="banner-warn" style="${warnStyle}">⚠️ 参考色表示（実際の塗料色とは異なります）</div>`:''}
    `;
  }else{
    banner.className='result-banner ng';
    banner.style.cssText='';
    const sugg=getSuggestions(val);
    const maybeHtml=sugg.length?`
      <div class="maybe-label">近似色の候補</div>
      <div class="maybe-chips">${sugg.map(({code,reason})=>{
        const h=getHex(code);
        return`<span class="maybe-chip" onclick="pick('${code}')">
          ${h?`<span class="chip-swatch" style="background:${h}"></span>`:''}
          <span><span class="chip-code">${code}</span><br><span class="chip-reason">${reason}</span></span>
        </span>`;
      }).join('')}</div>`:'';
    banner.innerHTML=`
      <div class="banner-status" style="color:var(--ng)">✗ 調色不可</div>
      <div class="banner-code" style="color:var(--ng)">${val}</div>
      <div class="banner-msg" style="color:var(--muted)">この番号は調色対象外です</div>
      ${maybeHtml}
    `;
  }
  setTimeout(()=>banner.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function getSuggestions(val){
  const ev=/^\d+$/.test(val)?'N'+val:val;
  const m=ev.match(/^([A-Z]*)(\d+)([A-Z]*)$/);
  const seen=new Set();const res=[];
  const add=(c,r)=>{if(!seen.has(c)){seen.add(c);res.push({code:c,reason:r})}};
  if(m){
    const[,pre,ns,suf]=m;const num=parseInt(ns);
    COLORS.forEach(c=>{const k=c.replace(/-/g,'').toUpperCase();const cm=k.match(/^([A-Z]*)(\d+)([A-Z]*)$/);if(cm&&cm[1]===pre&&cm[2]===ns&&cm[3]!==suf)add(c,'同番号・別グレード')});
    COLORS.map(c=>{const k=c.replace(/-/g,'').toUpperCase();const cm=k.match(/^([A-Z]*)(\d+)([A-Z]*)$/);return cm?{c,pre:cm[1],num:parseInt(cm[2]),suf:cm[3]}:null}).filter(x=>x&&x.pre===pre&&x.suf===suf&&x.num!==num).sort((a,b)=>Math.abs(a.num-num)-Math.abs(b.num-num)).forEach(x=>add(x.c,`数字近似(±${Math.abs(x.num-num)})`));
  }else{COLORS.forEach(c=>{if(c.replace(/-/g,'').toUpperCase().includes(val))add(c,'部分一致')})}
  return res.slice(0,5);
}

function openList(){
  const groups={};
  COLORS.forEach(c=>{const key=c.startsWith('N')?'N系':c.split('-')[0];if(!groups[key])groups[key]=[];groups[key].push(c)});
  const keys=Object.keys(groups).sort((a,b)=>{if(a==='N系')return 1;if(b==='N系')return -1;return parseInt(a)-parseInt(b)});
  const rows=keys.map(key=>{
    const label=key==='N系'?'N':key;
    const chips=groups[key].map(c=>{
      const h=getHex(c);
      const fg=h?textColor(h):'#1a2340';
      const bg=h||'#eef2fb';
      return`<span class="list-chip" style="background:${bg};color:${fg}" onclick="pickFromList('${c}')">${c}</span>`;
    }).join('');
    return`<tr><td class="list-grp">${label}</td><td><div class="list-chips">${chips}</div></td></tr>`;
  }).join('');
  document.getElementById('listTable').innerHTML=rows;
  document.getElementById('listCount').textContent='全'+COLORS.length+'色';
  document.getElementById('listOverlay').classList.add('show');
}
function pickFromList(code){closeList();document.getElementById('colorInput').value=code;checkColor()}
function closeList(){document.getElementById('listOverlay').classList.remove('show')}
</script>
